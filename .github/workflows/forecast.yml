name: CVE Forecast Update

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install kalmancve
        run: pip install .

      - name: Run forecast
        run: kalmancve --verbose

      - name: Commit updated forecast
        uses: EndBug/add-and-commit@v10
        with:
          default_author: github_actions
          add: "forecast_plot.png"
          message: "Update forecast"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
